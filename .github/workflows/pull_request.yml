name: Run .NET tests and Lint Dockerfile
on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:

  test_dot_net:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6

    - name: set-up-environment
      uses: DFE-Digital/github-actions/set-up-environment@master

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0'

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore /warnaserror /p:CheckEolTargetFramework=false

    - name: Spin Up Stack
      run: docker compose up -d

    - name: Test
      run: dotnet test --no-restore --verbosity normal

    - name: Lint Dockerfile
      uses: brpaz/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # Pinned at v3.3.0
      with:
        dockerfile: "Dockerfile"
